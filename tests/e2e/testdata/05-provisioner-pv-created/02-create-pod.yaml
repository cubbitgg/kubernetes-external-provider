# Creating the pod triggers WaitForFirstConsumer: the scheduler selects a node,
# which sets SelectedNodeName on the PVC, which triggers the provisioner.
apiVersion: v1
kind: Pod
metadata:
  name: provisioner-test-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: provisioner-test-pvc
