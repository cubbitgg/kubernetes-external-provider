apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  # The webhook will reject this pod because no node has the UUID label.
  # We use '|| true' so kuttl does not fail on the kubectl error itself --
  # the rejection is confirmed by the 01-errors.yaml that follows.
  - script: |
      kubectl apply -n "$NAMESPACE" -f - <<'EOF' 2>&1 || true
      apiVersion: v1
      kind: Pod
      metadata:
        name: rejected-pod
        namespace: placeholder
      spec:
        containers:
          - name: busybox
            image: busybox:1.36
            command: ["sleep", "3600"]
            volumeMounts:
              - name: data
                mountPath: /data
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: missing-uuid-pvc
      EOF
