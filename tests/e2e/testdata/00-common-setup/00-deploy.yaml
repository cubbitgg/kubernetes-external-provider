---
# ── Provisioner RBAC ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-disk-provisioner
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-disk-provisioner
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-disk-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-disk-provisioner
subjects:
  - kind: ServiceAccount
    name: local-disk-provisioner
    namespace: kube-system
---
# ── Webhook RBAC ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-disk-webhook
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-disk-webhook
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-disk-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-disk-webhook
subjects:
  - kind: ServiceAccount
    name: local-disk-webhook
    namespace: kube-system
---
# ── StorageClass ──────────────────────────────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-disk
provisioner: agent.cubbit.io/local-disk
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
# ── Provisioner Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-disk-provisioner
  namespace: kube-system
  labels:
    app: local-disk-provisioner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-disk-provisioner
  template:
    metadata:
      labels:
        app: local-disk-provisioner
    spec:
      serviceAccountName: local-disk-provisioner
      containers:
        - name: provisioner
          image: docker.io/gigiozzz/local-disk-provisioner:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# ── Webhook Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-disk-webhook
  namespace: kube-system
  labels:
    app: local-disk-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-disk-webhook
  template:
    metadata:
      labels:
        app: local-disk-webhook
    spec:
      serviceAccountName: local-disk-webhook
      containers:
        - name: webhook
          image: docker.io/gigiozzz/local-disk-webhook:latest
          imagePullPolicy: IfNotPresent
          args:
            - --addr=:8443
            - --self-sign
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# ── Webhook Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: local-disk-webhook
  namespace: kube-system
spec:
  selector:
    app: local-disk-webhook
  ports:
    - name: https
      port: 443
      targetPort: 8443
---
# ── MutatingWebhookConfiguration ─────────────────────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: local-disk-webhook
webhooks:
  - name: disk-affinity.agent.cubbit.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    reinvocationPolicy: IfNeeded
    clientConfig:
      service:
        name: local-disk-webhook
        namespace: kube-system
        path: /mutate
        port: 443
      caBundle: ""
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: ["kube-system"]
