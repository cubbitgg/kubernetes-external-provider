# This KubeSchedulerConfiguration must be mounted into the kube-scheduler pod.
#
# For kubeadm clusters, add this file to the control-plane and update the
# kube-scheduler static pod manifest to include:
#   --config=/etc/kubernetes/scheduler-config.yaml
#
# For managed clusters (EKS, GKE, AKS) where the scheduler is not accessible,
# consider using a mutating webhook that injects a nodeSelector annotation on
# pods whose PVCs carry agent.cubbit.io/disk-uuid, pointing to the node found
# by querying node labels.
apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
extenders:
  - urlPrefix: "http://local-disk-scheduler-extender.kube-system.svc.cluster.local:8888"
    filterVerb: "filter"
    weight: 1
    enableHTTPS: false
    httpTimeout: 10s
    # nodeCacheCapable: false means the scheduler sends the full NodeList to the
    # extender. The extender does not need to maintain its own node cache.
    nodeCacheCapable: false
    ignorable: false
