---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-disk-scheduler-extender
  namespace: kube-system
  labels:
    app: local-disk-scheduler-extender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: local-disk-scheduler-extender
  template:
    metadata:
      labels:
        app: local-disk-scheduler-extender
    spec:
      serviceAccountName: local-disk-scheduler-extender
      containers:
        - name: extender
          image: ghcr.io/cubbitgg/local-disk-scheduler-extender:latest
          imagePullPolicy: Always
          args:
            - --addr=:8888
          ports:
            - name: http
              containerPort: 8888
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: local-disk-scheduler-extender
  namespace: kube-system
spec:
  selector:
    app: local-disk-scheduler-extender
  ports:
    - name: http
      port: 8888
      targetPort: 8888
