# scheduler-init-job.yaml
#
# Privileged one-shot Job that configures the K3s embedded scheduler to use
# the local-disk scheduler extender — without requiring SSH access to the
# control-plane node.
#
# What it does:
#   1. Writes the KubeSchedulerConfiguration to
#      /var/lib/rancher/k3s/server/scheduler-config.yaml on the host.
#   2. Ensures /etc/rancher/k3s/config.yaml contains the kube-scheduler-arg
#      pointing at that file (creates or appends, never overwrites unrelated config).
#   3. Restarts the K3s service via nsenter into the host PID namespace.
#
# NOTE: The K3s restart triggered in step 3 will terminate this pod before the
# "K3s restart triggered" log line is printed. That is expected — the file writes
# (steps 1-2) complete before the restart, so the configuration is already in
# place. The Job may show as Failed/Unknown; that is safe to ignore after
# verifying the scheduler config file is present on the host.
#
# Usage:
#   kubectl apply -f deploy/scheduler-init-job.yaml
#   # Wait for K3s to come back up, then check the extender is active:
#   kubectl get pods -n kube-system -l app=local-disk-scheduler-extender
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-disk-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    extenders:
      - urlPrefix: "http://local-disk-scheduler-extender.kube-system.svc.cluster.local:8888"
        filterVerb: "filter"
        weight: 1
        enableHTTPS: false
        httpTimeout: 10s
        nodeCacheCapable: false
        ignorable: false
---
apiVersion: batch/v1
kind: Job
metadata:
  name: local-disk-scheduler-extender-init
  namespace: kube-system
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: local-disk-node-scanner
      restartPolicy: OnFailure
      hostPID: true
      # Must run on the control-plane node where K3s server is running.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: init
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # 1. Write the KubeSchedulerConfiguration to the K3s server directory.
              cp /config/scheduler-config.yaml /host/k3s-server/scheduler-config.yaml
              echo "Wrote /var/lib/rancher/k3s/server/scheduler-config.yaml"

              # 2. Ensure /etc/rancher/k3s/config.yaml contains the scheduler arg.
              CONFIG=/host/k3s-etc/config.yaml
              ARG='config=/var/lib/rancher/k3s/server/scheduler-config.yaml'

              mkdir -p /host/k3s-etc
              if [ ! -f "$CONFIG" ]; then
                printf 'kube-scheduler-arg:\n  - "%s"\n' "$ARG" > "$CONFIG"
                echo "Created $CONFIG with kube-scheduler-arg"
              elif grep -qF "$ARG" "$CONFIG"; then
                echo "kube-scheduler-arg already present in $CONFIG, skipping"
              else
                printf '\nkube-scheduler-arg:\n  - "%s"\n' "$ARG" >> "$CONFIG"
                echo "Appended kube-scheduler-arg to $CONFIG"
              fi

              # 3. Restart K3s via nsenter into the host PID namespace.
              # This will kill this pod — that is expected (see manifest comments).
              echo "Restarting K3s to apply scheduler config..."
              nsenter -t 1 -m -u -i -n -- systemctl restart k3s
              echo "K3s restart triggered"
          volumeMounts:
            - name: k3s-server
              mountPath: /host/k3s-server
            - name: k3s-etc
              mountPath: /host/k3s-etc
            - name: scheduler-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: k3s-server
          hostPath:
            path: /var/lib/rancher/k3s/server
            type: DirectoryOrCreate
        - name: k3s-etc
          hostPath:
            path: /etc/rancher/k3s
            type: DirectoryOrCreate
        - name: scheduler-config
          configMap:
            name: local-disk-scheduler-config
