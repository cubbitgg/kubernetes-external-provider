name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GO_VERSION: "1.25"

jobs:
  check:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run check
        run: make check

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and save images
        run: make docker-save VERSION=latest

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/docker-images.tar
          retention-days: 1

  test:
    name: Unit Tests
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests
        run: make unit-test

  e2e-test:
    name: E2E Tests
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: make docker-load

      - name: Run E2E tests
        id: e2e
        run: make e2e-run
        continue-on-error: true

      - name: Publish CTRF report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: tests/e2e/artifacts/ctrf-report.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload kind logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs
          path: tests/e2e/artifacts/kind-logs-*
          retention-days: 7
          if-no-files-found: warn

      - name: Upload kuttl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuttl-report
          path: tests/e2e/artifacts/kuttl-report.json
          retention-days: 7
          if-no-files-found: warn

      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
