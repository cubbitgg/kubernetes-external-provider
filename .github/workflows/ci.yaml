name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GO_VERSION: "1.25"

jobs:
  check:
    name: "Lint & Vet: ${{ matrix.module }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [commonlib, cmd-drivers, node-scanner, provisioner, webhook]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  build-provisioner:
    name: Build Provisioner Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build provisioner Docker image
        run: docker build -f provisioner/Dockerfile -t local-disk-provisioner:latest .

      - name: Save provisioner image
        run: docker save local-disk-provisioner:latest -o /tmp/provisioner.tar

      - uses: actions/upload-artifact@v4
        with:
          name: provisioner-image
          path: /tmp/provisioner.tar
          retention-days: 1

  build-webhook:
    name: Build Webhook Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build webhook Docker image
        run: docker build -f webhook/Dockerfile -t local-disk-webhook:latest .

      - name: Save webhook image
        run: docker save local-disk-webhook:latest -o /tmp/webhook.tar

      - uses: actions/upload-artifact@v4
        with:
          name: webhook-image
          path: /tmp/webhook.tar
          retention-days: 1

  build-scanner:
    name: Build Node Scanner Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build node-scanner Docker image
        run: docker build -f node-scanner/Dockerfile -t local-disk-node-scanner:latest .

  unit-test:
    name: "Unit Tests: ${{ matrix.module }}"
    needs: [check]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [cmd-drivers, provisioner, webhook]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests
        working-directory: ${{ matrix.module }}
        run: go test ./... -v -race

  e2e-test:
    name: E2E Tests
    needs: [unit-test, build-provisioner, build-webhook]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: provisioner-image
          path: /tmp

      - uses: actions/download-artifact@v4
        with:
          name: webhook-image
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/provisioner.tar
          docker load -i /tmp/webhook.tar
          docker tag local-disk-provisioner:latest docker.io/gigiozzz/local-disk-provisioner:latest
          docker tag local-disk-webhook:latest docker.io/gigiozzz/local-disk-webhook:latest

      - name: Run E2E tests
        id: e2e
        run: make e2e-run
        continue-on-error: true

      - name: Publish CTRF report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: tests/e2e/artifacts/ctrf-report.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload kind logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs
          path: tests/e2e/artifacts/kind-logs-*
          retention-days: 7
          if-no-files-found: warn

      - name: Upload kuttl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuttl-report
          path: tests/e2e/artifacts/kuttl-report.json
          retention-days: 7
          if-no-files-found: warn

      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
